<template>
    <div class="picker-wrapper">

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner
                    alternative-text="Loading specializations"
                    size="small"
                ></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template lwc:elseif={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                {errorMessage}
            </div>
        </template>

        <!-- Specialization Cards -->
        <template lwc:else>
            <lightning-layout multiple-rows>
                <template for:each={enrichedSpecializations} for:item="spec">
                    <lightning-layout-item
                        key={spec.key}
                        size="3"
                        padding="around-x-small"
                    >
                        <div
                            class={spec.cssClass}
                            data-key={spec.key}
                            data-label={spec.label}
                            data-price={spec.price}
                            onclick={handleSelect}
                        >
                            <p class="spec-name">{spec.label}</p>
                            <p class="spec-price">
                                <lightning-formatted-number
                                    value={spec.price}
                                    format-style="currency"
                                    currency-code="GBP"
                                ></lightning-formatted-number>
                            </p>
                        </div>
                    </lightning-layout-item>
                </template>
            </lightning-layout>
        </template>
    </div>
</template>
