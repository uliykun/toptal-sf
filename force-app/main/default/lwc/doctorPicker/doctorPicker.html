<template>
    <div class="picker-wrapper">

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner
                    alternative-text="Loading doctors"
                    size="small"
                ></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template lwc:elseif={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                {errorMessage}
            </div>
        </template>

        <!-- No doctors found -->
        <template lwc:elseif={isEmpty}>
            <p class="slds-text-color_weak slds-text-align_center slds-p-around_medium">
                No doctors found for this specialization.
            </p>
        </template>

        <!-- Doctor Cards -->
        <template lwc:else>
            <lightning-layout multiple-rows>
                <template for:each={enrichedDoctors} for:item="doctor">
                    <lightning-layout-item
                        key={doctor.id}
                        size="3"
                        padding="around-x-small"
                    >
                        <div
                            class={doctor.cssClass}
                            data-id={doctor.id}
                            data-calendar-id={doctor.calendarId}
                            data-name={doctor.fullName}
                            onclick={handleSelect}
                        >
                            <div class="doctor-avatar">
                                <lightning-icon
                                    icon-name="standard:person_account"
                                    size="medium"
                                ></lightning-icon>
                            </div>
                            <p class="doctor-name">{doctor.fullName}</p>
                            <p class="doctor-email">{doctor.email}</p>
                        </div>
                    </lightning-layout-item>
                </template>
            </lightning-layout>
        </template>
    </div>
</template>
